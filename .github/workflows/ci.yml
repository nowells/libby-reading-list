name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Check if last commit was VRT update
        id: check-vrt
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == "chore: update VRT screenshots" ]]; then
            echo "is_vrt_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_vrt_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('node_modules/playwright/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Update VRT screenshots on mismatch
        if: failure() && steps.check-vrt.outputs.is_vrt_commit != 'true'
        run: npx vitest run --update || true

      - name: Run e2e tests with coverage
        run: npm run test:e2e:coverage

      - name: Merge unit + e2e coverage
        run: npm run test:coverage:merge

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Commit updated VRT screenshots
        if: failure() && steps.check-vrt.outputs.is_vrt_commit != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/__screenshots__/**/*.png'
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "chore: update VRT screenshots"
            git push
          fi
