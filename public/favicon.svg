  <!-- Book 1 - tall, tilted left -->
  <rect x="12" y="14" width="8" height="38" rx="1.5" fill="#3b82f6" transform="rotate(-4 12 14)" />
  <!-- Book 2 - medium -->
  <rect x="22" y="20" width="8" height="32" rx="1.5" fill="#f59e0b" />
  <!-- Book 3 - short -->
  <rect x="32" y="26" width="8" height="26" rx="1.5" fill="#10b981" />
  <!-- Book 4 - tall, tilted right -->
  <rect x="42" y="16" width="8" height="36" rx="1.5" fill="#fb7185" transform="rotate(3 42 16)" />
  <!-- Checkmark circle -->
  <circle cx="50" cy="14" r="12" fill="#22c55e" />
